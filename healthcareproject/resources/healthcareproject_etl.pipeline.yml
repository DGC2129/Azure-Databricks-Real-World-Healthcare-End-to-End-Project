# The main pipeline for healthcareproject

resources:
  pipelines:
    healthcareproject_etl:
      name: healthcareproject_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/healthcareproject_etl"

      libraries:
        - glob:
            include: ../src/healthcareproject_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
