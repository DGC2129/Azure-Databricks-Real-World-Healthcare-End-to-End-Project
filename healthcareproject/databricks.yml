# This is a Databricks asset bundle definition for healthcareproject.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: healthcareproject
  uuid: beb20572-44e8-4729-b14f-7d34b8a22d22

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405604782640489.9.azuredatabricks.net
    variables:
      catalog: dev_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405604782640489.9.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/srinadh.rx100_gmail.com#ext#@srinadhrx100gmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/srinadh.rx100_gmail.com#ext#@srinadhrx100gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dev_catalog
      schema: prod
    permissions:
      - user_name: srinadh.rx100_gmail.com#ext#@srinadhrx100gmail.onmicrosoft.com
        level: CAN_MANAGE
